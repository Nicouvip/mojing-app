<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>自动对轨工具 - AutoTrack</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="app">
        <!-- 顶栏 -->
        <header id="topbar">
            <div class="topbar-left">
                <h1 class="logo">🎧 AutoTrack</h1>
                <span class="project-name" id="projectName">未命名工程</span>
            </div>
            <div class="topbar-right">
                <button class="btn" onclick="projectSave()">💾 保存</button>
                <button class="btn" onclick="projectLoad()">📂 打开</button>
                <button class="btn btn-primary" onclick="runAlign()">⚡ 一键对齐</button>
                <button class="btn btn-success" onclick="runExport()">📤 导出成品</button>
            </div>
        </header>

        <!-- 主体 -->
        <div id="main">
            <!-- 左侧面板 -->
            <div id="left-panel">
                <!-- 剧本编辑 -->
                <section class="panel-section" id="script-section">
                    <div class="panel-header">
                        <h2>📜 剧本</h2>
                        <div class="panel-actions">
                            <button class="btn-sm" onclick="scriptParse()">解析</button>
                            <button class="btn-sm" onclick="scriptClear()">清空</button>
                        </div>
                    </div>
                    <textarea id="scriptInput" placeholder="粘贴剧本，支持格式：
[张总]: 大家好，欢迎收听
[小李]: 今天我们来聊聊..."></textarea>
                    <div id="scriptPreview" class="script-preview"></div>
                </section>

                <!-- 音频管理 -->
                <section class="panel-section" id="audio-section">
                    <div class="panel-header">
                        <h2>🎤 音频文件</h2>
                        <div class="panel-actions">
                            <button class="btn-sm" onclick="document.getElementById('audioUpload').click()">上传</button>
                        </div>
                    </div>
                    <input type="file" id="audioUpload" accept="audio/*" multiple style="display:none">
                    <div id="audioList" class="audio-list">
                        <div class="empty-hint">上传各CV的音频文件</div>
                    </div>
                </section>

                <!-- ASR 配置 -->
                <section class="panel-section collapsible" id="asr-section">
                    <div class="panel-header" onclick="toggleCollapse('asr-section')">
                        <h2>🎙️ ASR 识别配置</h2>
                        <span class="collapse-icon">▼</span>
                    </div>
                    <div class="panel-body">
                        <div class="form-row">
                            <label>API Key</label>
                            <input type="password" id="asrApiKey" placeholder="tp-xxx 或 sk-xxx">
                        </div>
                        <div class="form-row">
                            <label>接口地址</label>
                            <input type="text" id="asrBaseUrl" placeholder="留空自动推断">
                        </div>
                        <div class="form-row">
                            <label>语言</label>
                            <select id="asrLanguage">
                                <option value="zh">中文</option>
                                <option value="en">英文</option>
                                <option value="auto">自动检测</option>
                            </select>
                        </div>
                        <div class="provider-badge" id="providerBadge">🔌 未配置</div>
                        <button class="btn-sm" onclick="saveAsrConfig()">保存配置</button>
                    </div>
                </section>
            </div>

            <!-- 右侧主区域 -->
            <div id="right-panel">
                <!-- 操作面板 -->
                <div id="action-bar">
                    <div class="action-group">
                        <button class="btn" onclick="transcribeAll()" title="对所有音频运行ASR识别">🎙️ 全部转写</button>
                        <button class="btn" onclick="runAlign()" title="将ASR结果匹配到剧本">🔗 执行对齐</button>
                    </div>
                    <div class="action-group">
                        <span class="badge" id="statusBadge">就绪</span>
                    </div>
                </div>

                <!-- 波形显示区域 -->
                <div id="waveform-container">
                    <div id="waveform-timeline">
                        <div class="timeline-header">
                            <h3>📊 对齐时间线</h3>
                            <div class="timeline-controls">
                                <button class="btn-sm" onclick="zoomIn()">🔍+</button>
                                <button class="btn-sm" onclick="zoomOut()">🔍−</button>
                                <button class="btn-sm" onclick="fitZoom()">适应</button>
                            </div>
                        </div>
                        <div id="timelineContent">
                            <div class="empty-hint">上传音频 → ASR转写 → 对齐 → 导出</div>
                        </div>
                    </div>
                </div>

                <!-- 参数面板 -->
                <div id="params-bar">
                    <div class="params-tabs">
                        <button class="param-tab active" data-tab="fade">交叉渐变</button>
                        <button class="param-tab" data-tab="click">咔嗒声</button>
                        <button class="param-tab" data-tab="silence">静音裁剪</button>
                        <button class="param-tab" data-tab="export">导出格式</button>
                        <button class="param-tab" data-tab="normalize">响度</button>
                    </div>
                    <div class="params-content" id="paramsContent">
                        <!-- 由 js/parameters.js 动态渲染 -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 工程文件选择弹窗 -->
    <div id="modalOverlay" class="modal-overlay" style="display:none">
        <div class="modal">
            <div class="modal-header">
                <h3 id="modalTitle">选择工程文件</h3>
                <button class="btn-sm" onclick="closeModal()">✕</button>
            </div>
            <div class="modal-body" id="modalBody"></div>
        </div>
    </div>

    <!-- 脚本（顺序加载） -->
    <script src="js/script_editor.js"></script>
    <script src="js/audio_manager.js"></script>
    <script src="js/waveform_view.js"></script>
    <script src="js/parameters.js"></script>
    <script src="js/app.js"></script>

    <!-- 错误诊断 -->
    <script>
        console.log('AutoTrack 前端已加载');
        console.log('API地址:', window.location.origin);
        fetch('/api/project').then(r => {
            if (r.ok) console.log('API连接正常');
            else console.error('API返回错误:', r.status);
        }).catch(e => console.error('API连接失败:', e));
    </script>
</body>
</html>
