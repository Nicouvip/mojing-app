<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AutoTrack</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="app">

  <!-- Header -->
  <header id="header">
    <div class="logo-area">
      <svg class="logo-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/>
      </svg>
      <span class="logo-text">AutoTrack</span>
    </div>
    <nav class="toolbar">
      <button class="btn btn-ghost" onclick="showImport()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        导入
      </button>
      <button class="btn btn-primary" onclick="runAlign()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5 3 19 12 5 21 5 3"/></svg>
        对齐
      </button>
      <button class="btn btn-success" onclick="runExport()" id="exportBtn" disabled>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        导出
      </button>
    </nav>
    <div class="header-right">
      <div id="progressDisplay" class="progress-display"></div>
      <span id="statusBadge" class="status-badge">Ready</span>
      <button class="btn-icon" onclick="showSettings()" title="设置">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
      </button>
    </div>
  </header>

  <!-- Main -->
  <div id="main">

    <!-- Sidebar: Files -->
    <aside id="sidebar">
      <div class="sidebar-header">
        <h2 class="sidebar-title">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/></svg>
          音频文件
        </h2>
        <button class="btn-add" onclick="importAudio()" title="添加音频文件">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        </button>
      </div>
      <div id="audioList" class="file-list">
        <div class="empty-hint">拖入音频文件<br>或点击 + 添加</div>
      </div>
      <div class="sidebar-footer">
        <div class="step-indicator">
          <span class="step-dot" id="step1"></span>
          <span class="step-dot" id="step2"></span>
          <span class="step-dot" id="step3"></span>
          <span class="step-dot" id="step4"></span>
        </div>
        <span class="step-label" id="stepLabel">导入素材</span>
      </div>
    </aside>

    <!-- Workspace -->
    <main id="workspace">

      <!-- Import View -->
      <div id="view-import" class="workspace-view active">
        <div class="welcome">
          <div class="welcome-graphic">
            <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/>
            </svg>
          </div>
          <h1 class="welcome-title">自动对轨</h1>
          <p class="welcome-desc">导入剧本和音频，一键完成多轨对齐</p>
          <div class="import-grid">
            <div class="import-card" onclick="importScript()">
              <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/></svg>
              <div class="import-card-label">导入剧本</div>
              <div class="import-card-desc">粘贴小说或台词文本</div>
            </div>
            <div class="import-card" onclick="importAudio()">
              <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
              <div class="import-card-label">添加音频</div>
              <div class="import-card-desc">支持 MP3 / WAV / FLAC</div>
            </div>
          </div>
          <div id="scriptInfo" class="script-info" style="display:none"></div>
        </div>
      </div>

      <!-- Align View -->
      <div id="view-align" class="workspace-view">
        <div class="timeline-bar">
          <span id="timelineInfo" class="timeline-info"></span>
          <button class="btn btn-sm" onclick="playAll()" id="playAllBtn" disabled>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>
            试听全部
          </button>
        </div>
        <div id="timelineContent" class="timeline-content"></div>
      </div>

    </main>
  </div>

</div>

<!-- Modal -->
<div id="modal" class="modal-mask" style="display:none" onclick="if(event.target===this)closeModal()">
  <div class="modal-box"><div class="modal-head" id="modalHead"></div><div class="modal-body" id="modalBody"></div></div>
</div>

<script src="js/app.js"></script>
</body>
</html>
