<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>墨境 · 书桌 · 叠书设计</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #f5f2ed; color: #1a1814;
  font-family: 'Inter','PingFang SC',sans-serif;
  min-height: 100vh; display: flex; align-items: center; justify-content: center;
  padding: 40px;
}

main { width: 900px; }
h1 { font-family: 'Noto Serif SC',serif; font-size: 28px; margin-bottom: 6px; font-weight: 400; }
.sub { color: rgba(26,24,20,0.35); font-style: italic; font-size: 15px; margin-bottom: 48px; }

/* 书堆容器 */
.stack {
  position: relative; height: 340px;
  display: flex; align-items: center; justify-content: center;
  perspective: 800px;
  perspective-origin: center center;
}

/* 单本书 —— 层叠 + 展开 */
.book {
  position: absolute;
  width: 155px; height: 210px;
  border-radius: 4px 14px 14px 4px;
  cursor: pointer;
  transform-origin: center bottom;
  transition: transform 0.45s cubic-bezier(0.22,1,0.36,1),
              box-shadow 0.45s ease,
              z-index 0s step-end;
  z-index: 1;
  display: flex; flex-direction: column;
  overflow: hidden;
}

/* 封面内容 */
.book .cover {
  position: relative; z-index: 1;
  padding: 18px 14px; height: 100%;
  display: flex; flex-direction: column;
}
.book .genre {
  font-size: 9px; letter-spacing: 0.15em; text-transform: uppercase;
  color: rgba(255,255,255,0.5); margin-bottom: 6px;
}
.book .title {
  font-family: 'Noto Serif SC',serif;
  font-size: 20px; font-weight: 700; line-height: 1.25;
}
.book .meta {
  margin-top: auto; font-size: 9px; opacity: 0.45;
}

/* 封面反光 */
.book .sheen {
  position: absolute; inset: 0; z-index: 0;
  pointer-events: none;
}

/* 各本书配色 */

.book:nth-child(1) {
  background: linear-gradient(150deg, #4a3028 0%, #6a4a3e 40%, #5a3a30 100%);
  color: #f0e8d8;
  transform: rotate(-18deg) translateX(-160px) translateY(10px);
  z-index: 1;
}
.book:nth-child(1) .sheen {
  background: radial-gradient(ellipse at 70% 20%, rgba(255,255,255,0.06) 0%, transparent 60%);
}

.book:nth-child(2) {
  background: linear-gradient(145deg, #2a3848 0%, #3a4e5c 45%, #304050 100%);
  color: #dce4ec;
  transform: rotate(-10deg) translateX(-100px) translateY(6px);
  z-index: 2;
}
.book:nth-child(2) .sheen {
  background: radial-gradient(ellipse at 50% 30%, rgba(255,255,255,0.05) 0%, transparent 55%);
}

.book:nth-child(3) {
  background: linear-gradient(160deg, #3a5040 0%, #5a6e5e 45%, #4a604e 100%);
  color: #e0ece0;
  transform: rotate(-2deg) translateX(-30px) translateY(0px);
  z-index: 3;
}
.book:nth-child(3) .sheen {
  background: radial-gradient(ellipse at 60% 25%, rgba(255,255,255,0.06) 0%, transparent 55%);
}

.book:nth-child(4) {
  background: linear-gradient(150deg, #4a2a2e 0%, #6a3a3e 40%, #5a3034 100%);
  color: #f8ece8;
  transform: rotate(8deg) translateX(60px) translateY(0px);
  z-index: 4;
  border: 1px solid rgba(196,149,106,0.25);
  box-shadow: 0 8px 30px rgba(196,149,106,0.15), 0 2px 8px rgba(0,0,0,0.08);
}
.book:nth-child(4) .sheen {
  background: radial-gradient(ellipse at 30% 40%, rgba(255,255,255,0.06) 0%, transparent 60%);
}

/* 金标装饰 */
.book:nth-child(4)::before {
  content: '✦'; position: absolute; right: 14px; top: 10px;
  font-size: 11px; color: rgba(196,149,106,0.4); z-index: 1;
}

.book:nth-child(5) {
  background: linear-gradient(145deg, #3a3836 0%, #504a3e 35%, #423e3a 100%);
  color: #e8e6e2;
  transform: rotate(16deg) translateX(130px) translateY(6px);
  z-index: 2;
}
.book:nth-child(5) .sheen {
  background: radial-gradient(ellipse at 70% 30%, rgba(255,255,255,0.05) 0%, transparent 55%);
}

.book:nth-child(6) {
  background: linear-gradient(150deg, #3a2e38 0%, #503e48 40%, #42303e 100%);
  color: #ece0e8;
  transform: rotate(22deg) translateX(190px) translateY(12px);
  z-index: 1;
}
.book:nth-child(6) .sheen {
  background: radial-gradient(ellipse at 40% 20%, rgba(255,255,255,0.05) 0%, transparent 55%);
}

/* 空书位 */
.book.empty {
  background: transparent !important;
  color: transparent !important;
  border: 1px dashed rgba(26,24,20,0.06);
  border-radius: 4px 14px 14px 4px;
}

/* hover：抽书 */
.book:hover {
  transform: translateY(-20px) scale(1.08) !important;
  z-index: 30 !important;
  box-shadow: 0 24px 56px rgba(196,149,106,0.2), 0 6px 20px rgba(0,0,0,0.1) !important;
  transition: transform 0.45s cubic-bezier(0.22,1,0.36,1),
              box-shadow 0.45s ease,
              z-index 0s step-start !important;
}

/* 底部桌面线 */
.stack::after {
  content: ''; position: absolute; bottom: 10px; left: 8%; right: 8%;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(196,149,106,0.15) 30%, rgba(196,149,106,0.2) 50%, rgba(196,149,106,0.15) 70%, transparent);
}

.instructions {
  position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
  background: rgba(26,24,20,0.7); color: rgba(255,255,255,0.6);
  padding: 8px 20px; border-radius: 20px; font-size: 12px;
}
</style>
</head>
<body>
<main>
  <h1>我的书桌</h1>
  <p class="sub">案上的每一本书，都是你正在编织的世界</p>

  <div class="stack">
    <div class="book"><div class="sheen"></div><div class="cover"><span class="genre">悬疑</span><div class="title">归途</div><span class="meta">7章 · 1.8万字</span></div></div>
    <div class="book"><div class="sheen"></div><div class="cover"><span class="genre">玄幻</span><div class="title">星河流转</div><span class="meta">18章 · 6.1万字</span></div></div>
    <div class="book"><div class="sheen"></div><div class="cover"><span class="genre">都市</span><div class="title">长安诀</div><span class="meta">12章 · 3.2万字</span></div></div>
    <div class="book"><div class="sheen"></div><div class="cover"><span class="genre">科幻</span><div class="title">末世重生</div><span class="meta">24章 · 12.3万字</span></div></div>
    <div class="book"><div class="sheen"></div><div class="cover"><span class="genre">仙侠</span><div class="title">江湖夜雨</div><span class="meta">9章 · 2.4万字</span></div></div>
    <div class="book"><div class="sheen"></div><div class="cover"><span class="genre">灵异</span><div class="title">霜寒</div><span class="meta">15章 · 4.7万字</span></div></div>
  </div>
</main>
<div class="instructions">🖱 hover 书本 → 抽书效果 | 中间红皮书是当前正在写的</div>
</body>
</html>
