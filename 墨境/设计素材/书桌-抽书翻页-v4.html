<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>墨境 · 书桌 v4</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #f5f2ed; color: #1a1814;
  font-family: 'Inter','PingFang SC',sans-serif;
  min-height: 100vh; display: flex; align-items: center; justify-content: center;
  overflow: hidden;
}

/* 翻书推进的遮罩 */
.overlay {
  position: fixed; inset: 0; z-index: 100;
  background: #f5f2ed;
  opacity: 0; pointer-events: none;
  transition: opacity 0.6s ease;
}
.overlay.active { opacity: 1; pointer-events: auto; }

main { width: 900px; position: relative; z-index: 1; }
h1 { font-family: 'Noto Serif SC',serif; font-size: 28px; margin-bottom: 6px; font-weight: 400; }
.sub { color: rgba(26,24,20,0.35); font-style: italic; font-size: 15px; margin-bottom: 48px; }

/* 书堆 */
.stack {
  position: relative; height: 300px;
  display: flex; align-items: flex-end; justify-content: center;
}

/* 书 */
.book {
  position: absolute; bottom: 0;
  width: 148px; height: 200px;
  border-radius: 4px 12px 12px 4px;
  cursor: pointer;
  transform-origin: center bottom;
  transition: transform 0.5s cubic-bezier(0.25,1,0.5,1),
              box-shadow 0.5s ease,
              filter 0.5s ease;
  z-index: 1;
  display: flex; flex-direction: column;
  overflow: hidden;
}

.book .cover {
  position: relative; z-index: 1;
  padding: 16px 14px; height: 100%;
  display: flex; flex-direction: column;
}
.book .genre {
  font-size: 9px; letter-spacing: 0.12em;
  color: rgba(255,255,255,0.5); margin-bottom: 6px;
}
.book .title {
  font-family: 'Noto Serif SC',serif;
  font-size: 18px; font-weight: 700; line-height: 1.25;
}
.book .meta {
  margin-top: auto; font-size: 9px; opacity: 0.4;
}
.book .shine {
  position: absolute; inset: 0; z-index: 0; pointer-events: none;
}

/* 各书默认位置 */
.book:nth-child(1) {
  background: linear-gradient(150deg, #4a3028 0%, #6a4a3e 40%, #5a3a30 100%);
  color: #f0e8d8;
  transform: translateX(-210px) rotate(-14deg);
  z-index: 1;
}
.book:nth-child(2) {
  background: linear-gradient(145deg, #2a3848 0%, #3a4e5c 45%, #304050 100%);
  color: #dce4ec;
  transform: translateX(-135px) rotate(-8deg);
  z-index: 2;
}
.book:nth-child(3) {
  background: linear-gradient(160deg, #3a5040 0%, #5a6e5e 45%, #4a604e 100%);
  color: #e0ece0;
  transform: translateX(-50px) rotate(-2deg);
  z-index: 3;
}
.book:nth-child(4) {
  background: linear-gradient(150deg, #4a2a2e 0%, #6a3a3e 40%, #5a3034 100%);
  color: #f8ece8;
  transform: translateX(50px) rotate(5deg);
  z-index: 4;
}
.book:nth-child(5) {
  background: linear-gradient(145deg, #3a3836 0%, #504a3e 35%, #423e3a 100%);
  color: #e8e6e2;
  transform: translateX(135px) rotate(10deg);
  z-index: 2;
}
.book:nth-child(6) {
  background: linear-gradient(150deg, #3a2e38 0%, #503e48 40%, #42303e 100%);
  color: #ece0e8;
  transform: translateX(210px) rotate(16deg);
  z-index: 1;
}

/* 铜金边 */
.book:nth-child(4) { box-shadow: 0 6px 24px rgba(196,149,106,0.12), 0 1px 3px rgba(0,0,0,0.06); }
.book:nth-child(4)::after {
  content: ''; position: absolute; left: 0; top: 0; bottom: 0;
  width: 2px;
  background: linear-gradient(to bottom, rgba(196,149,106,0.4), rgba(196,149,106,0.05));
}

/* hover：轻轻抽出 */
.book:hover {
  transform: translateY(-10px) scale(1.03) !important;
  z-index: 20 !important;
  box-shadow: 0 16px 40px rgba(196,149,106,0.18), 0 4px 12px rgba(0,0,0,0.08) !important;
  filter: brightness(1.08);
  transition: transform 0.4s cubic-bezier(0.25,1,0.5,1),
              box-shadow 0.4s ease,
              filter 0.4s ease !important;
}

/* 点击态：翻书缩放 */
.book.opening {
  z-index: 200 !important;
  transition: transform 0.7s cubic-bezier(0.22,1,0.36,1),
              box-shadow 0.7s ease,
              border-radius 0.7s ease !important;
  transform: translateY(-10px) scale(1.5) rotate(0deg) !important;
  box-shadow: 0 30px 60px rgba(196,149,106,0.2), 0 8px 24px rgba(0,0,0,0.12) !important;
  filter: brightness(1.12);
}

/* 翻书页效果 */
.page-flip {
  position: absolute; inset: 0;
  background: linear-gradient(to right, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0) 50%);
  transform-origin: left center;
  transform: rotateY(0deg);
  opacity: 0;
  transition: none;
  pointer-events: none; z-index: 0;
}
.book.opening .page-flip {
  animation: flip .7s ease-out forwards;
}
@keyframes flip {
  0% { opacity: 1; transform: rotateY(0deg); }
  40% { opacity: 1; transform: rotateY(-25deg); }
  100% { opacity: 0; transform: rotateY(-60deg); }
}

/* 桌面线 */
.stack::after {
  content: ''; position: absolute; bottom: 0; left: 5%; right: 5%;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(196,149,106,0.12) 30%, rgba(196,149,106,0.18) 50%, rgba(196,149,106,0.12) 70%, transparent);
}

.instructions {
  position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
  background: rgba(26,24,20,0.7); color: rgba(255,255,255,0.6);
  padding: 8px 20px; border-radius: 20px; font-size: 12px;
}
</style>
</head>
<body>

<div class="overlay" id="overlay"></div>

<main>
  <h1>我的书桌</h1>
  <p class="sub">案上的每一本书，都是你正在编织的世界</p>

  <div class="stack" id="stack">
    <div class="book" onclick="openBook(this)"><div class="page-flip"></div><div class="cover"><span class="genre">悬疑</span><div class="title">归途</div><span class="meta">7章 · 1.8万字</span></div></div>
    <div class="book" onclick="openBook(this)"><div class="page-flip"></div><div class="cover"><span class="genre">玄幻</span><div class="title">星河流转</div><span class="meta">18章 · 6.1万字</span></div></div>
    <div class="book" onclick="openBook(this)"><div class="page-flip"></div><div class="cover"><span class="genre">都市</span><div class="title">长安诀</div><span class="meta">12章 · 3.2万字</span></div></div>
    <div class="book" onclick="openBook(this)"><div class="page-flip"></div><div class="cover"><span class="genre">科幻</span><div class="title">末世重生</div><span class="meta">24章 · 12.3万字</span></div></div>
    <div class="book" onclick="openBook(this)"><div class="page-flip"></div><div class="cover"><span class="genre">仙侠</span><div class="title">江湖夜雨</div><span class="meta">9章 · 2.4万字</span></div></div>
    <div class="book" onclick="openBook(this)"><div class="page-flip"></div><div class="cover"><span class="genre">灵异</span><div class="title">霜寒</div><span class="meta">15章 · 4.7万字</span></div></div>
  </div>
</main>

<div class="instructions">🖱 hover → 轻轻抽出 &nbsp;|&nbsp; 点击 → 翻开书 + 镜头推进</div>

<script>
function openBook(el) {
  // 1. 书本翻开
  el.classList.add('opening')

  // 2. 其他书淡出
  document.querySelectorAll('.book').forEach(b => {
    if (b !== el) b.style.opacity = '0.3'
  })

  // 3. 镜头推进（遮罩渐显）
  setTimeout(() => {
    document.getElementById('overlay').classList.add('active')
  }, 500)

  // 4. 模拟跳转
  setTimeout(() => {
    document.getElementById('overlay').innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100vh;font-family:Noto Serif SC,serif;font-size:24px;color:#1a1814;flex-direction:column;gap:12px"><div style="font-size:40px">📖</div><div>进入编辑器...</div><div style="font-size:14px;color:rgba(26,24,20,0.4)">（实际项目中会路由到 /editor/[id]）</div></div>'
  }, 1300)
}
</script>
</body>
</html>
