<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>墨境 · 书桌 3D 书架设计预览</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #161514;
  color: #e8e6e1;
  font-family: 'Noto Serif SC', 'Songti SC', serif;
  display: flex; align-items: center; justify-content: center;
  min-height: 100vh; padding: 40px;
}
.desk {
  max-width: 1000px; width: 100%;
}
.desk h1 { font-size: 28px; font-weight: 400; margin-bottom: 8px; color: #e8e6e1; }
.desk .subtitle { font-size: 15px; color: rgba(232,230,225,0.4); font-style: italic; margin-bottom: 48px; }

/* 书架舞台 */
.stage {
  perspective: 1600px;
  perspective-origin: center bottom;
  display: flex; align-items: flex-end; justify-content: center;
  gap: 0; padding: 60px 0 40px;
  position: relative; height: 420px;
}

/* 桌面线 */
.stage::after {
  content: ''; position: absolute; bottom: 0; left: 5%; right: 5%;
  height: 2px;
  background: linear-gradient(90deg, transparent, rgba(196,149,106,0.3) 20%, rgba(196,149,106,0.5) 50%, rgba(196,149,106,0.3) 80%, transparent);
}

/* 单本书 */
.book {
  position: relative;
  width: 90px; height: 280px;
  transform-origin: bottom center;
  cursor: pointer; margin: 0 -4px;
  transition: transform 0.5s cubic-bezier(0.22,1,0.36,1), z-index 0s;
  z-index: 1;
}

.book .spine {
  position: absolute; top: 0; left: 0; right: 0; bottom: 0;
  border-radius: 3px 3px 0 0;
  display: flex; flex-direction: column; align-items: center; justify-content: flex-end;
  padding: 0 8px 16px;
  overflow: hidden;
}

/* 书脊高光线 */
.spine::before {
  content: ''; position: absolute; left: 6px; top: 12px; bottom: 36px;
  width: 1px;
  background: linear-gradient(to bottom, rgba(255,255,255,0.3), transparent);
}

/* 书脊横纹 */
.spine::after {
  content: ''; position: absolute; left: 2px; right: 2px; top: 20px; bottom: 20px;
  background: repeating-linear-gradient(
    to bottom, transparent, transparent 3px, rgba(0,0,0,0.04) 3px, rgba(0,0,0,0.04) 5px
  );
}

/* 厚度侧边 */
.book .edge {
  position: absolute; right: -6px; top: 0; bottom: 0;
  width: 6px;
  background: inherit; filter: brightness(1.15);
  border-radius: 0 2px 2px 0;
}

/* 书名 */
.spine .title {
  font-family: 'Noto Serif SC', serif;
  font-size: 13px; font-weight: 600;
  writing-mode: vertical-rl;
  color: rgba(255,255,255,0.9);
  letter-spacing: 0.08em;
  text-shadow: 0 1px 2px rgba(0,0,0,0.3);
  max-height: 140px;
  overflow: hidden;
  position: relative; z-index: 1;
}

.spine .info {
  font-size: 9px; color: rgba(255,255,255,0.5);
  letter-spacing: 0.1em;
  margin-top: 4px;
  position: relative; z-index: 1;
}

/* 装订线金标 */
.book.gold-mark .spine {
  border-top: 3px solid rgba(196,149,106,0.6);
  border-bottom: 3px solid rgba(196,149,106,0.4);
}

/* 不同颜色 */
.book:nth-child(1) .spine { background: linear-gradient(90deg, #3a2e28, #4a3a32, #3a2e28); }
.book:nth-child(2) .spine { background: linear-gradient(90deg, #1e3a3a, #264a4a, #1e3a3a); }
.book:nth-child(3) .spine { background: linear-gradient(90deg, #3a1e1e, #4a2828, #3a1e1e); }
.book:nth-child(4) .spine { background: linear-gradient(90deg, #2e2840, #3a3250, #2e2840); }
.book:nth-child(5) .spine { background: linear-gradient(90deg, #282828, #383838, #282828); }
.book:nth-child(6) .spine { background: linear-gradient(90deg, #1e2e3a, #283e4a, #1e2e3a); }
.book:nth-child(7) .spine { background: linear-gradient(90deg, #3a2a1e, #4a3a2e, #3a2a1e); }

/* 不同高度 */
.book:nth-child(1) { height: 270px; margin-top: 10px; }
.book:nth-child(2) { height: 290px; margin-top: 0; }
.book:nth-child(3) { height: 260px; margin-top: 20px; }
.book:nth-child(4) { height: 300px; margin-top: 0; }
.book:nth-child(5) { height: 275px; margin-top: 5px; }
.book:nth-child(6) { height: 285px; margin-top: 0; }
.book:nth-child(7) { height: 265px; margin-top: 15px; }

/* 倾斜角度 */
.book:nth-child(1) { transform: rotateY(-18deg) rotateZ(2deg); }
.book:nth-child(2) { transform: rotateY(-12deg) rotateZ(1.5deg); }
.book:nth-child(3) { transform: rotateY(-6deg) rotateZ(0); }
.book:nth-child(4) { transform: rotateY(0deg) rotateZ(0); }
.book:nth-child(5) { transform: rotateY(6deg) rotateZ(0); }
.book:nth-child(6) { transform: rotateY(12deg) rotateZ(-1.5deg); }
.book:nth-child(7) { transform: rotateY(18deg) rotateZ(-2deg); }

/* hover 抽书效果 */
.book:hover {
  transform: translateY(-20px) rotateY(0deg) rotateZ(0deg) scale(1.05) !important;
  z-index: 30 !important;
  box-shadow: 0 20px 60px rgba(196,149,106,0.25), 0 8px 20px rgba(0,0,0,0.4);
  transition: transform 0.5s cubic-bezier(0.22,1,0.36,1), box-shadow 0.5s ease, z-index 0s;
}

.book:hover .spine {
  box-shadow: inset 0 0 40px rgba(196,149,106,0.1);
}

/* 空书位 */
.empty-slot {
  width: 90px; height: 260px;
  margin: 0 -4px; margin-top: 20px;
  border: 1px dashed rgba(232,230,225,0.08);
  border-radius: 3px 3px 0 0;
  display: flex; align-items: center; justify-content: center;
  color: rgba(232,230,225,0.12);
  font-size: 24px;
}

.instructions {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
  background: rgba(0,0,0,0.6); color: rgba(255,255,255,0.5);
  padding: 8px 20px; border-radius: 20px; font-size: 12px;
  font-family: Inter, sans-serif;
}
</style>
</head>
<body>
<div class="desk">
  <h1>我的书桌</h1>
  <p class="subtitle">案上的每一本书，都是你正在编织的世界</p>

  <div class="stage">
    <div class="book gold-mark">
      <div class="spine"><span class="title">江湖夜雨</span><span class="info">2.4万字</span></div>
      <div class="edge"></div>
    </div>
    <div class="book">
      <div class="spine"><span class="title">星河流转</span><span class="info">6.1万字</span></div>
      <div class="edge"></div>
    </div>
    <div class="book gold-mark">
      <div class="spine"><span class="title">归途</span><span class="info">1.8万字</span></div>
      <div class="edge"></div>
    </div>
    <div class="book gold-mark">
      <div class="spine"><span class="title">末世重生</span><span class="info">12.3万字</span></div>
      <div class="edge"></div>
    </div>
    <div class="book">
      <div class="spine"><span class="title">长安诀</span><span class="info">3.2万字</span></div>
      <div class="edge"></div>
    </div>
    <div class="book">
      <div class="spine"><span class="title">深海回响</span><span class="info">0.6万字</span></div>
      <div class="edge"></div>
    </div>
    <div class="book gold-mark">
      <div class="spine"><span class="title">霜寒</span><span class="info">4.7万字</span></div>
      <div class="edge"></div>
    </div>
  </div>
</div>
<div class="instructions">🖱 hover 任意一本书 → 抽书效果 | 每本书颜色/高度/倾斜各不相同</div>
</body>
</html>
