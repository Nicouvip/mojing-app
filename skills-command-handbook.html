<style>
  @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');

  :root {
    --glow-purple: rgba(139, 92, 246, 0.15);
    --glow-emerald: rgba(52, 211, 153, 0.10);
    --glass-bg: rgba(255, 255, 255, 0.03);
    --glass-border: rgba(255, 255, 255, 0.06);
    --hairline: rgba(255, 255, 255, 0.08);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
    background: #050505;
    color: #f5f5f5;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* 背景径向光晕 */
  .bg-glow {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    background:
      radial-gradient(ellipse 70% 60% at 15% 20%, rgba(139, 92, 246, 0.08) 0%, transparent 60%),
      radial-gradient(ellipse 60% 50% at 85% 80%, rgba(52, 211, 153, 0.06) 0%, transparent 60%),
      radial-gradient(ellipse 50% 40% at 50% 50%, rgba(99, 102, 241, 0.04) 0%, transparent 50%);
  }

  /* 噪声纹理 (固定层) */
  .noise-overlay {
    position: fixed;
    inset: 0;
    z-index: 1;
    pointer-events: none;
    opacity: 0.025;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
    background-repeat: repeat;
    background-size: 256px 256px;
  }

  /* 自定义滚动条 */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 2px; }

  /* 页面内容容器 */
  .page-content {
    position: relative;
    z-index: 2;
  }

  /* 双边框卡片 */
  .double-bezel-outer {
    background: rgba(255, 255, 255, 0.03);
    border: 1px solid rgba(255, 255, 255, 0.06);
    padding: 2px;
    border-radius: 1.25rem;
    transition: all 0.6s cubic-bezier(0.32, 0.72, 0, 1);
  }
  .double-bezel-outer:hover {
    border-color: rgba(255, 255, 255, 0.12);
    transform: translateY(-2px);
  }

  .double-bezel-inner {
    background: rgba(255, 255, 255, 0.02);
    border-radius: calc(1.25rem - 2px);
    box-shadow: inset 0 1px 1px rgba(255, 255, 255, 0.06);
    padding: 1.25rem;
    transition: all 0.6s cubic-bezier(0.32, 0.72, 0, 1);
  }

  /* 命令代码块 */
  .cmd-code {
    font-family: 'Geist', 'SF Mono', ui-monospace, monospace;
    font-size: 0.875rem;
    color: #e2e8f0;
    background: rgba(255,255,255,0.04);
    border-radius: 0.5rem;
    padding: 0.25rem 0.625rem;
    border: 1px solid rgba(255,255,255,0.06);
    transition: all 0.4s cubic-bezier(0.32, 0.72, 0, 1);
    letter-spacing: -0.01em;
  }

  /* 复制按钮 - Button-in-Button 架构 */
  .copy-btn {
    position: relative;
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    padding: 0.375rem 0.5rem 0.375rem 0.75rem;
    border-radius: 9999px;
    border: none;
    background: rgba(255, 255, 255, 0.06);
    color: rgba(255, 255, 255, 0.6);
    font-size: 0.75rem;
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.4s cubic-bezier(0.32, 0.72, 0, 1);
    white-space: nowrap;
  }
  .copy-btn:hover {
    background: rgba(139, 92, 246, 0.15);
    color: #c4b5fd;
    transform: scale(0.97);
  }
  .copy-btn:active {
    transform: scale(0.94);
  }
  .copy-btn .icon-ring {
    width: 1.5rem;
    height: 1.5rem;
    border-radius: 9999px;
    background: rgba(255, 255, 255, 0.06);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.4s cubic-bezier(0.32, 0.72, 0, 1);
    flex-shrink: 0;
  }
  .copy-btn:hover .icon-ring {
    background: rgba(139, 92, 246, 0.2);
    transform: translateX(1px) translateY(-1px) scale(1.05);
  }
  .copy-btn .icon-ring svg {
    width: 0.75rem;
    height: 0.75rem;
    stroke: currentColor;
    fill: none;
    stroke-width: 2;
    stroke-linecap: round;
    stroke-linejoin: round;
  }
  .copy-btn.copied {
    background: rgba(52, 211, 153, 0.12);
    color: #6ee7b7;
  }
  .copy-btn.copied .icon-ring {
    background: rgba(52, 211, 153, 0.15);
  }

  /* 分类标语 */
  .category-badge {
    display: inline-flex;
    align-items: center;
    gap: 0.375rem;
    padding: 0.25rem 0.75rem;
    border-radius: 9999px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.06);
    font-size: 0.625rem;
    font-weight: 600;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.35);
  }

  /* 滚动渐入动画 */
  .reveal {
    opacity: 0;
    transform: translateY(2rem) scale(0.98);
    filter: blur(4px);
    transition: all 0.8s cubic-bezier(0.32, 0.72, 0, 1);
  }
  .reveal.visible {
    opacity: 1;
    transform: translateY(0) scale(1);
    filter: blur(0);
  }

  /* 导航岛 */
  .nav-island {
    position: fixed;
    top: 1.5rem;
    left: 50%;
    transform: translateX(-50%);
    z-index: 100;
    background: rgba(5, 5, 5, 0.75);
    backdrop-filter: blur(24px) saturate(1.4);
    -webkit-backdrop-filter: blur(24px) saturate(1.4);
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: 9999px;
    padding: 0.5rem 1.5rem;
    display: flex;
    align-items: center;
    gap: 1rem;
    font-size: 0.8125rem;
    font-weight: 500;
    color: rgba(255,255,255,0.5);
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  }
  .nav-island .badge-count {
    background: rgba(139,92,246,0.15);
    color: #c4b5fd;
    padding: 0.125rem 0.5rem;
    border-radius: 9999px;
    font-size: 0.6875rem;
    font-weight: 600;
  }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 2rem;
    left: 50%;
    transform: translateX(-50%) translateY(1rem);
    z-index: 200;
    background: rgba(5,5,5,0.9);
    backdrop-filter: blur(16px);
    border: 1px solid rgba(52,211,153,0.2);
    border-radius: 9999px;
    padding: 0.625rem 1.25rem;
    font-size: 0.8125rem;
    color: #6ee7b7;
    opacity: 0;
    transition: all 0.5s cubic-bezier(0.32, 0.72, 0, 1);
    pointer-events: none;
    font-weight: 500;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  }
  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  @media (max-width: 768px) {
    .nav-island {
      top: 0.75rem;
      padding: 0.375rem 1rem;
      font-size: 0.75rem;
      width: calc(100% - 1.5rem);
      border-radius: 0.75rem;
      justify-content: center;
    }
    .double-bezel-inner {
      padding: 0.875rem;
    }
    .cmd-code {
      font-size: 0.8125rem;
      max-width: 100%;
      overflow-x: auto;
    }
    .copy-btn {
      font-size: 0.6875rem;
      padding: 0.25rem 0.375rem 0.25rem 0.625rem;
    }
    .copy-btn .icon-ring {
      width: 1.25rem;
      height: 1.25rem;
    }
    .toast {
      bottom: 1.5rem;
      width: calc(100% - 2rem);
      text-align: center;
    }
  }
</style>
</head>

  btn.setAttribute('aria-label', `复制 ${cmd}`);
  btn.innerHTML = `
    <span>复制</span>
    <span class="icon-ring">
      <svg viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
    </span>
  `;

  btn.addEventListener('click', async (e) => {
    e.stopPropagation();
    try {
      await navigator.clipboard.writeText(cmd);
      btn.classList.add('copied');
      btn.innerHTML = `
        <span>已复制</span>
        <span class="icon-ring">
          <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
        </span>
      `;
      showToast(`✓ 已复制 ${cmd}`);
      setTimeout(() => {
        btn.classList.remove('copied');
        btn.innerHTML = `
          <span>复制</span>
          <span class="icon-ring">
            <svg viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
          </span>
        `;
      }, 2000);
    } catch (err) {
      // 降级方案
      const ta = document.createElement('textarea');
      ta.value = cmd;
      ta.style.position = 'fixed';
      ta.style.opacity = '0';
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
      btn.classList.add('copied');
      btn.innerHTML = `<span>已复制</span><span class="icon-ring"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg></span>`;
      showToast(`✓ 已复制 ${cmd}`);
      setTimeout(() => {
        btn.classList.remove('copied');
        btn.innerHTML = `
          <span>复制</span>
          <span class="icon-ring">
            <svg viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
          </span>
        `;
      }, 2000);
    }
  });

  return btn;
}

function createCommandCard(item, index) {
  const colSpan = (index % 5 === 0) ? 'col-span-12 md:col-span-6' :
                  (index % 7 === 0) ? 'col-span-12 md:col-span-5' :
                  'col-span-12 md:col-span-4';

  const wrapper = document.createElement('div');
  wrapper.className = `${colSpan} reveal`;
  wrapper.setAttribute('data-index', index);

  wrapper.innerHTML = `
    <div class="double-bezel-outer">
      <div class="double-bezel-inner">
        <div style="display: flex; align-items: flex-start; justify-content: space-between; gap: 1rem;">
          <div style="flex: 1; min-width: 0;">
            <div style="display: flex; align-items: center; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 0.5rem;">
              <code class="cmd-code">${item.cmd}</code>
            </div>
            <p style="font-size: 0.8125rem; color: rgba(255,255,255,0.45); line-height: 1.5; font-weight: 400;">
              ${item.desc}
            </p>
          </div>
        </div>
      </div>
    </div>
  `;

  // 将复制按钮注入到 card 中
  const inner = wrapper.querySelector('.double-bezel-inner > div');
  const btn = createCopyButton(item.cmd);
  inner.appendChild(btn);

  return wrapper;
}

function createCategorySection(cat, catIndex) {
  const section = document.createElement('div');
  section.className = 'col-span-12 reveal';
  section.setAttribute('data-index', `cat-${catIndex}`);
  section.style.marginTop = catIndex === 0 ? '0' : '2rem';

  const heading = document.createElement('div');
  heading.style.cssText = 'display: flex; align-items: center; gap: 0.75rem; margin-bottom: 1rem;';

  const badge = document.createElement('span');
  badge.className = 'category-badge';
  badge.textContent = `${cat.icon} ${cat.name}`;
  heading.appendChild(badge);

  const count = document.createElement('span');
  count.style.cssText = 'font-size: 0.75rem; color: rgba(255,255,255,0.2); font-weight: 500;';
  count.textContent = `${cat.commands.length} 个命令`;
  heading.appendChild(count);

  section.appendChild(heading);

  const subGrid = document.createElement('div');
  subGrid.style.cssText = 'display: grid; grid-template-columns: repeat(12, 1fr); gap: 0.875rem;';
  subGrid.className = 'sub-grid';

  cat.commands.forEach((item, idx) => {
    const card = createCommandCard(item, idx + catIndex * 7);
    subGrid.appendChild(card);
  });

  section.appendChild(subGrid);
  return section;
}

categories.forEach((cat, i) => {
  grid.appendChild(createCategorySection(cat, i));
});

// ====== Toast ======
let toastTimer = null;
function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => {
    toast.classList.remove('show');
  }, 2000);
}

// ====== IntersectionObserver - 滚动渐入 ======
const observer = new IntersectionObserver((entries) => {
  entries.forEach(entry => {
    if (entry.isIntersecting) {
      entry.target.classList.add('visible');
    }
  });
}, { threshold: 0.05, rootMargin: '0px 0px -40px 0px' });

document.querySelectorAll('.reveal').forEach(el => observer.observe(el));

// 初始可见 - 让首屏直接显示
setTimeout(() => {
  document.querySelectorAll('.reveal').forEach(el => {
    const rect = el.getBoundingClientRect();
    if (rect.top < window.innerHeight) {
      el.classList.add('visible');
    }
  });
}, 100);
</script>
