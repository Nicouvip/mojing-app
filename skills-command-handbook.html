<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>技能包命令手册</title>
<script src="https://cdn.tailwindcss.com">
</script>
<link href="https://fonts.cdnfonts.com/css/geist" rel="stylesheet">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Plus Jakarta Sans', 'Geist', system-ui, sans-serif;
    background: #0a0a0b;
    color: #f0f0f0;
    min-height: 100vh;
  }

  /* 微妙的背景层次 */
  .bg-texture {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    background:
      radial-gradient(ellipse 50% 35% at 50% 0%, rgba(99,102,241,0.06) 0%, transparent 60%),
      radial-gradient(ellipse 40% 30% at 80% 100%, rgba(52,211,153,0.04) 0%, transparent 60%);
  }

  .page-content { position: relative; z-index: 1; }

  /* 简单、洁净的卡片 */
  .cmd-card {
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 1rem;
    padding: 1.25rem 1.25rem 1rem;
    transition: border-color 0.3s ease, background 0.3s ease;
    display: flex;
    flex-direction: column;
    gap: 0.75rem;
  }
  .cmd-card:hover {
    border-color: rgba(255,255,255,0.12);
    background: rgba(255,255,255,0.05);
  }

  /* 命令标签 */
  .cmd-label {
    font-family: 'Geist', 'SF Mono', ui-monospace, monospace;
    font-size: 1.125rem;
    font-weight: 500;
    color: #e8e8e8;
    letter-spacing: -0.02em;
    line-height: 1.3;
    word-break: break-all;
  }

  /* 说明文字 */
  .cmd-desc {
    font-size: 0.9375rem;
    color: rgba(255,255,255,0.45);
    line-height: 1.6;
    font-weight: 400;
    min-height: 2.8em;
  }

  /* 复制按钮 - 干净利落 */
  .copy-btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 0.5rem;
    padding: 0.5rem 1rem;
    border-radius: 0.5rem;
    border: 1px solid rgba(255,255,255,0.08);
    background: rgba(255,255,255,0.04);
    color: rgba(255,255,255,0.5);
    font-size: 0.8125rem;
    font-family: inherit;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.25s ease;
    width: 100%;
    margin-top: auto;
  }
  .copy-btn:hover {
    background: rgba(99,102,241,0.12);
    border-color: rgba(99,102,241,0.2);
    color: #a5b4fc;
  }
  .copy-btn:active {
    transform: scale(0.97);
  }
  .copy-btn.copied {
    background: rgba(52,211,153,0.1);
    border-color: rgba(52,211,153,0.2);
    color: #6ee7b7;
  }

  .copy-btn svg {
    width: 1rem;
    height: 1rem;
    flex-shrink: 0;
  }

  /* 分类标签 */
  .cat-tag {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    font-size: 1.25rem;
    font-weight: 600;
    color: rgba(255,255,255,0.85);
    letter-spacing: -0.01em;
  }
  .cat-tag .count {
    font-size: 0.8125rem;
    font-weight: 400;
    color: rgba(255,255,255,0.25);
  }

  /* 分类分割线 */
  .cat-divider {
    height: 1px;
    background: linear-gradient(90deg, rgba(255,255,255,0.08) 0%, transparent 100%);
    margin: 0.5rem 0 1.25rem;
  }

  /* 滚动渐入 */
  .reveal {
    opacity: 0;
    transform: translateY(1.25rem);
    transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
  }
  .reveal.visible {
    opacity: 1;
    transform: translateY(0);
  }

  /* 导航条 */
  .topbar {
    position: sticky;
    top: 0;
    z-index: 50;
    background: rgba(10,10,11,0.8);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border-bottom: 1px solid rgba(255,255,255,0.05);
  }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 2rem;
    left: 50%;
    transform: translateX(-50%) translateY(1rem);
    z-index: 100;
    background: #1a1a1c;
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 0.75rem;
    padding: 0.75rem 1.5rem;
    font-size: 0.9375rem;
    color: #c4b5fd;
    opacity: 0;
    transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    pointer-events: none;
    font-weight: 500;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  }
  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* 搜索框 */
  .search-box {
    width: 100%;
    max-width: 24rem;
    padding: 0.625rem 1rem;
    border-radius: 0.75rem;
    border: 1px solid rgba(255,255,255,0.06);
    background: rgba(255,255,255,0.03);
    color: #f0f0f0;
    font-size: 0.9375rem;
    font-family: inherit;
    outline: none;
    transition: border-color 0.25s ease;
  }
  .search-box::placeholder { color: rgba(255,255,255,0.2); }
  .search-box:focus { border-color: rgba(99,102,241,0.3); }

  @media (max-width: 768px) {
    .cmd-label { font-size: 1rem; }
    .cmd-desc { font-size: 0.875rem; }
    .cat-tag { font-size: 1.125rem; }
    .topbar { padding: 0.75rem 1rem; }
  }

  /* 滚动条 */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.06); border-radius: 2px; }
</style>
</head>
<body>

// ====== 搜索与复制逻辑 ======
const container = document.getElementById('commands-container');
const searchInput = document.getElementById('search');

function render(filter = '') {
  container.innerHTML = '';
  const lowerFilter = filter.toLowerCase().trim();

  categories.forEach((cat, catIdx) => {
    const filtered = cat.commands.filter(c =>
      c.cmd.toLowerCase().includes(lowerFilter) ||
      c.desc.toLowerCase().includes(lowerFilter)
    );
    if (filtered.length === 0) return;

    // 分类标题
    const section = document.createElement('div');
    section.className = 'mb-8 sm:mb-10';

    const header = document.createElement('div');
    header.className = 'cat-tag reveal';
    header.innerHTML = `${cat.name} <span class="count">${filtered.length}</span>`;
    section.appendChild(header);

    const divider = document.createElement('div');
    divider.className = 'cat-divider';
    section.appendChild(divider);

    // 卡片网格
    const grid = document.createElement('div');
    grid.className = 'grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-3 sm:gap-4';
    grid.id = `grid-${catIdx}`;

    filtered.forEach((item, idx) => {
      const card = document.createElement('div');
      card.className = 'cmd-card reveal';
      card.style.transitionDelay = `${(idx % 9) * 40}ms`;

      card.innerHTML = `
        <div>
          <div class="cmd-label">${item.cmd}</div>
          <div class="cmd-desc mt-1.5">${item.desc}</div>
        </div>
        <button class="copy-btn" data-cmd="${item.cmd}" aria-label="复制 ${item.cmd}">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
          </svg>
          <span>复制</span>
        </button>
      `;

      grid.appendChild(card);
    });

    section.appendChild(grid);
    container.appendChild(section);
  });

  // 绑定复制事件
  document.querySelectorAll('.copy-btn').forEach(btn => {
    btn.removeEventListener('click', handleCopy);
    btn.addEventListener('click', handleCopy);
  });

  // 触发滚动渐入
  requestAnimationFrame(() => {
    document.querySelectorAll('.reveal').forEach(el => el.classList.add('visible'));
  });
}

function handleCopy(e) {
  const btn = e.currentTarget;
  const cmd = btn.dataset.cmd;

  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(cmd).catch(() => fallbackCopy(cmd, btn));
  } else {
    fallbackCopy(cmd, btn);
  }

  btn.classList.add('copied');
  btn.querySelector('span').textContent = '已复制';
  btn.querySelector('svg').innerHTML = '<polyline points="20 6 9 17 4 12"/>';

  showToast(`已复制 ${cmd}`);

  setTimeout(() => {
    btn.classList.remove('copied');
    btn.querySelector('span').textContent = '复制';
    btn.querySelector('svg').innerHTML = '<rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>';
  }, 1800);
}

function fallbackCopy(text, btn) {
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed';
  ta.style.opacity = '0';
  document.body.appendChild(ta);
  ta.select();
  document.execCommand('copy');
  document.body.removeChild(ta);
}

let toastTimer = null;
function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toast.classList.remove('show'), 2000);
}

// 搜索防抖
let searchTimer = null;
searchInput.addEventListener('input', () => {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => render(searchInput.value), 150);
});

// 初始化
render();
</script>
